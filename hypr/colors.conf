# ══════════════════════════════════════════════════════════════
#  colors.conf — single source of truth for the whole theme
#  Default palette: pure black & white (monochrome)
#  Change the hex values below and every app (Hyprland, Waybar,
#  rofi, kitty, dunst) will pick up the new palette automatically.
#  Run `scripts/reload-theme.sh` after editing to apply live.
# ══════════════════════════════════════════════════════════════

# Core palette
$background   = 0xff000000   # window background / base
$foreground   = 0xffffffff   # text / icons
$accent       = 0xffffffff   # active border, highlights (set to any color, e.g. 0xffff5555 for red)
$muted        = 0xff808080   # inactive/secondary elements
$surface      = 0xff0d0d0d   # panel / bar background (slightly off-black)
$border_inactive = 0xff2b2b2b

# Derived (used directly by Hyprland border gradient)
$active_border   = $accent
$inactive_border = $border_inactive

# Opacity (0.0 - 1.0)
$active_opacity   = 1.0
$inactive_opacity = 0.92

# App-specific opacity - picked up by scripts/reload-theme.sh and
# pushed into kitty/kitty.conf and waybar/colors.css automatically.
$kitty_opacity    = 0.60
$bar_opacity      = 0.85
