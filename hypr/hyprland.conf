# ══════════════════════════════════════════════════════════════
#  Hyprland config — black & white edition
#  Repo: hyprland-dots
#  Colors live in colors.conf — edit that file to retheme.
# ══════════════════════════════════════════════════════════════

source = ~/.config/hypr/colors.conf

# ─────────────────────────────
# Monitors (edit to match your setup, or leave auto)
# monitors.conf is generated by the Quickshell Monitor Manager (SUPER+M) -
# specific monitor= rules in there take precedence; the wildcard below
# only fills in for monitors it hasn't configured yet.
# ─────────────────────────────
source = ~/.config/hypr/monitors.conf
monitor=,preferred,auto,1

# ─────────────────────────────
# Autostart
# ─────────────────────────────
# This has to run FIRST, before anything else - it syncs WAYLAND_DISPLAY
# and XDG_CURRENT_DESKTOP into the D-Bus activation environment so
# everything launched after it (portals, quickshell, etc.) sees a
# properly-populated environment instead of racing against it.
exec-once = hash dbus-update-activation-environment 2>/dev/null && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORM

# waybar is wrapped in a restart loop + logged to ~/.cache/waybar.log,
# and pointed at its config/style explicitly (-c/-s) so it can never
# silently fall back to the system default /etc/xdg/waybar config —
# which is what makes it look "unconfigured"/colorful instead of the
# black & white theme even though it's technically running fine.
# If the bar is ever missing, check the log first — it almost always
# crashed on a bad module (e.g. no temperature sensor found).
exec-once = sh -c 'mkdir -p ~/.cache; while true; do waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css >> ~/.cache/waybar.log 2>&1; sleep 1; done'
exec-once = dunst
exec-once = hyprpaper
# Quickshell — runs the OSD (volume/brightness popup), Control Center
# (SUPER+A), and Monitor Manager (SUPER+M). All three stay invisible
# until triggered, so this doesn't add or compete with the waybar top
# bar. Wrapped in the same restart-loop + logging pattern as waybar
# above, PLUS a short initial sleep - quickshell is a Qt/QML app with
# more startup dependencies (font enumeration, QML JIT) than the other
# autostarted programs here, so it's the most likely one to lose a race
# against the session still settling in the first second or two. The
# sleep avoids that first failed attempt outright rather than just
# recovering from it. If MONITORS/MORE/the OSD ever stop responding,
# check ~/.cache/qs.log first - `pgrep -fa qs` confirms whether it's
# running at all.
exec-once = sh -c 'mkdir -p ~/.cache; sleep 2; while true; do qs >> ~/.cache/qs.log 2>&1; sleep 1; done'
# Restore whichever wallpaper was last picked (cycle-wallpaper.sh /
# pick-wallpaper.sh write this cache file). Falls back to hyprpaper.conf's
# default if nothing's been picked yet. The short sleep gives hyprpaper
# time to finish preloading before we ask it to switch.
exec-once = sh -c 'sleep 1; w="$(cat ~/.cache/hypr-current-wallpaper 2>/dev/null)"; [ -n "$w" ] && [ -f "$w" ] && hyprctl hyprpaper wallpaper ",$w"'
exec-once = swayidle -w timeout 300 'hyprlock' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'
exec-once = wl-paste --watch cliphist store

# ─────────────────────────────
# Environment
# ─────────────────────────────
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
# Explicit Wayland backend for Qt/QML apps (quickshell) - without this
# some Qt builds probe for an X11/XWayland display first before falling
# back to Wayland, which can add startup delay or, on a system with no
# XWayland at all, fail outright instead of just using Wayland directly.
env = QT_QPA_PLATFORM,wayland

# ─────────────────────────────
# Input
# ─────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# ─────────────────────────────
# General look — monochrome by default (colors.conf)
# ─────────────────────────────
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 6

    active_opacity = $active_opacity
    inactive_opacity = $inactive_opacity

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = 0x66000000
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = true
    bezier = smooth, 0.25, 0.1, 0.25, 1
    bezier = snappy, 0.05, 0.9, 0.1, 1.05
    bezier = overshot, 0.34, 1.56, 0.64, 1
    bezier = linear, 0, 0, 1, 1

    animation = windows, 1, 5, overshot, popin 85%
    animation = windowsOut, 1, 4, smooth, popin 80%
    animation = windowsMove, 1, 4, snappy
    animation = border, 1, 8, linear
    animation = borderangle, 1, 30, linear, loop
    animation = fade, 1, 4, smooth
    animation = fadeDim, 1, 4, smooth
    animation = workspaces, 1, 5, snappy, slide
    animation = specialWorkspace, 1, 5, snappy, slidevert
    animation = layers, 1, 4, smooth, slide
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

# NOTE: touchpad workspace-swipe (gestures { workspace_swipe = true }) was
# removed from the .conf format in Hyprland 0.51+ and now requires a Lua
# config (hl.gesture{...}) — see the Gestures page on the wiki if you want
# it back. Mouse-wheel workspace switching is already bound below
# ($mainMod + scroll) as a keyboard/mouse equivalent.

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = $background
}

# ─────────────────────────────
# Keybinds
# ─────────────────────────────
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, R, exec, ~/.config/hypr-scripts/run-command.sh
bind = $mainMod, W, exec, ~/.config/hypr-scripts/pick-wallpaper.sh
bind = $mainMod SHIFT, D, exec, kitty --title "hyprland-dots doctor" -e ~/.config/hypr-scripts/doctor.sh
bind = $mainMod, A, exec, qs ipc call controlcenter toggle
bind = $mainMod, M, exec, qs ipc call monitors toggle
bind = $mainMod, T, exec, ~/.config/hypr-scripts/theme-picker.sh
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, F, fullscreen,
bind = $mainMod, L, exec, hyprlock
bind = , PRINT, exec, grimblast copy area

# Focus movement
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Workspaces 1-10
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media / volume
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr-scripts/osd-volume.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr-scripts/osd-volume.sh down
bindel = ,XF86AudioMute, exec, ~/.config/hypr-scripts/osd-volume.sh mute
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr-scripts/osd-brightness.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr-scripts/osd-brightness.sh down

# ─────────────────────────────
# Window rules
# ─────────────────────────────
windowrule = float class:^(pavucontrol)$
windowrule = float class:^(nm-connection-editor)$
windowrule = float class:^(rofi)$
# NOTE: kitty's own background_opacity (kitty/kitty.conf, themed from
# colors.conf's $kitty_opacity) is what controls terminal transparency.
# Do NOT add `windowrule = opaque class:^(kitty)$` here — it forces the
# window fully opaque and silently overrides kitty's opacity setting.
