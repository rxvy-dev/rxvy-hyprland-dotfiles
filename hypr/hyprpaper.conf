# All presets are preloaded so switching (via the waybar wallpaper button,
# or scripts/cycle-wallpaper.sh) is instant with no flicker/reload.
# NOTE: hyprpaper does NOT expand `~` in paths (confirmed: `hyprctl
# hyprpaper preload ~/...` returns "bad path"). Must use $HOME or a
# full absolute path here, or nothing loads and hyprpaper starts blank.
preload = $HOME/.config/hypr/wallpapers/mountains.png
preload = $HOME/.config/hypr/wallpapers/contours.png
preload = $HOME/.config/hypr/wallpapers/grid.png
preload = $HOME/.config/hypr/wallpapers/triangles.png
preload = $HOME/.config/hypr/wallpapers/blocks.png
preload = $HOME/.config/hypr/wallpapers/waves.png
preload = $HOME/.config/hypr/wallpapers/circuit.png
preload = $HOME/.config/hypr/wallpapers/spiral.png
preload = $HOME/.config/hypr/wallpapers/diagonal.png

wallpaper = ,$HOME/.config/hypr/wallpapers/mountains.png
splash = false
ipc = true
