# Colors generated from ~/.config/hypr/colors.conf -> kitty/colors.conf
include colors.conf

font_family      JetBrainsMono Nerd Font
font_size        11.5
bold_font        auto
italic_font      auto

window_padding_width 10
# Synced from hypr/colors.conf's $kitty_opacity by scripts/reload-theme.sh
# - edit it there, not here, then re-run the script.
background_opacity   0.60
dynamic_background_opacity yes
confirm_os_window_close 0

cursor_shape beam
# Animate the blink fade instead of a hard on/off flash
cursor_blink_interval 0.5 ease-in-out
cursor_stop_blinking_after 15.0

# Comet-style trail that follows large cursor jumps
cursor_trail 200
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2
cursor_trail_color none

enable_audio_bell no
visual_bell_duration 0.2 ease-in-out
visual_bell_color none

remember_window_size  yes
resize_debounce_time  0.1 0.1

tab_bar_style powerline
tab_powerline_style slanted
